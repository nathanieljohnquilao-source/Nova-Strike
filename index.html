<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA STRIKE — Retro Space Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrapper">

  <!-- HUD bar -->
  <div id="hud">
    <div id="score-display">
      <div class="label">SCORE</div>
      <div class="value" id="score-val">000000</div>
    </div>
    <div id="hi-display">
      <div class="label">HI-SCORE</div>
      <div class="value" id="hi-val">000000</div>
    </div>
    <div id="lives-display">
      <div class="label">SHIELDS</div>
      <div id="lives-icons"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas" width="480" height="540"></canvas>

  <!-- Footer bar -->
  <div id="footer">
    <span>© 2025 NOVA STRIKE</span>
    <span id="level-display">LVL 01</span>
    <span>F — FULLSCREEN</span>
  </div>

  <!-- Overlay (title / pause / game over) -->
  <div id="overlay">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="game-title" id="overlay-title">NOVA<br>STRIKE</div>
    <div class="game-subtitle" id="overlay-subtitle">— INTERSTELLAR COMBAT —</div>
    <div class="pixel-divider"></div>
    <div id="overlay-extra"></div>
    <button class="btn-start" id="start-btn">► START GAME</button>
    <div class="controls-hint">
      <span>ARROWS / WASD</span> — MOVE<br>
      <span>SPACE</span> — FIRE &nbsp;&nbsp; <span>ESC</span> — PAUSE
    </div>
  </div>

</div>
<script src="game.js"></script>
</body>
</html>
